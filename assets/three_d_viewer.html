<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
        }
        model-viewer {
            width: 100%;
            height: 100vh;
            background: transparent;
            --poster-color: transparent;
        }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            text-align: center;
            z-index: 1000;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 107, 53, 0.2);
            border-top-color: #FF6B35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>
<div id="loading">
    <div class="spinner"></div>
    <div>Loading 3D Model...</div>
</div>

<model-viewer
        id="model-viewer"
        src="friedrice.glb"
        alt="Fried Rice 3D Model"
        auto-rotate
        camera-controls
        camera-orbit="0deg 75deg 105%"
        shadow-intensity="1.5"
        shadow-softness="0.8"
        exposure="1.2"
        environment-image="neutral"
        ar
        ar-modes="webxr scene-viewer quick-look"
        loading="eager"
        reveal="auto"
        style="display: none;">
</model-viewer>

<script>
    const modelViewer = document.getElementById('model-viewer');
    const loading = document.getElementById('loading');

    modelViewer.addEventListener('load', () => {
        loading.style.display = 'none';
        modelViewer.style.display = 'block';
    });

    modelViewer.addEventListener('error', (error) => {
        loading.innerHTML = `
            <div style="color: #FF6B35;">⚠️</div>
            <div style="margin-top: 16px;">Failed to load 3D model</div>
            <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">Check if friedrice.glb exists</div>
        `;
    });

    // Handle messages from Flutter
    window.addEventListener('message', (event) => {
        if (event.data === 'reset') {
            modelViewer.cameraOrbit = '0deg 75deg 105%';
        } else if (event.data === 'toggleRotate') {
            modelViewer.autoRotate = !modelViewer.autoRotate;
        }
    });
</script>
</body>
</html>
